          - generic [ref=e123]: 概述
        - generic [ref=e125]:
          - paragraph [ref=e126]: 科学家和专业人士的英语写作助手 - 告别中式英语，轻松写出专业地道的英语论文、文书和信函。
          - paragraph [ref=e127]: 写作助手是一款为科学家和专业人士设计的工具，旨在提高他们的英语写作水平。无论你当前的英语水平如何，写作助手都可以帮助你将你的写作转化为专业水平的英语。它还可以直接将你的母语（例如西班牙语、日语、中文和许多其他语言）翻译成英语。它可以改写句子或整段文字。 目前，许多来自哈佛大学、斯坦福大学、加州理工学院和Clariant等大学和公司的研究人员和专业人士正在使用写作助手来改善他们的手稿、技术报告和电子邮件中的英语表达。 使用此扩展程序需要一个帐户，部分功能需要高级订阅。欲了解更多信息，请访问https://www.storkapp.me/writeassistant/。如有问题和建议，请通过https://www.storkapp.me/contact.php与我们联系。
