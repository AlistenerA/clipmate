<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>ClipMate Asset Picker 无候选测试</title>

  <body>
    <main>
      <article>
        <h1>无可选正文图片</h1>

      </article>
    </main>
