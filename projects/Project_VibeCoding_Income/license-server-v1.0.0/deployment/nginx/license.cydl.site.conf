# Version: v1.0.0
limit_req_zone $binary_remote_addr zone=clipmate_license_production:10m rate=30r/m;

server {
    listen 80;
    server_name license.cydl.site;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name license.cydl.site;

    ssl_certificate /etc/letsencrypt/live/license.cydl.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/license.cydl.site/privkey.pem;
    ssl_protocols TLSv1.2;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 8k;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options DENY always;

    location /api/ {
        limit_req zone=clipmate_license_production burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}
