<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipMate Asset Picker 20 张上限测试</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; color: #172033; background: #eef2f7; }
      main { width: min(960px, calc(100% - 32px)); margin: 32px auto; padding: 28px; background: #fff; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      img { display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover; }
    </style>
  </head>
  <body>
    <main>
      <article>
        <h1>连续选择 22 张图片</h1>
        <p>按编号从 1 点到 22。ClipMate 应只接受前 20 张，第 21、22 张不应加入。</p>
        <div class="grid">
          <img src="/images/limit-01.svg" alt="上限测试图 01" width="480" height="270" />
          <img src="/images/limit-02.svg" alt="上限测试图 02" width="480" height="270" />
